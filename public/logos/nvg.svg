<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="Northside Ventures Group">
  <defs>
    <linearGradient id="nvgSky" x1="8" y1="88" x2="112" y2="18" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4FC7FF"/>
      <stop offset="1" stop-color="#BFE8FF"/>
    </linearGradient>
  </defs>
  <!-- Chicago-inspired skyline silhouette, NVG wordmark embedded at the base -->
  <g fill="url(#nvgSky)">
    <rect x="9" y="62" width="10" height="27"/>
    <rect x="21" y="50" width="12" height="39"/>
    <rect x="35" y="58" width="9" height="31"/>
    <!-- twin cylindrical towers -->
    <rect x="46" y="45" width="8" height="44" rx="4"/>
    <rect x="56" y="45" width="8" height="44" rx="4"/>
    <!-- tallest tapered tower with antenna spire -->
    <path d="M67 89 V40 L71 40 V30 L74 30 V40 L78 40 V89 Z"/>
    <rect x="72" y="16" width="2" height="14"/>
    <rect x="83" y="53" width="11" height="36"/>
    <rect x="96" y="61" width="9" height="28"/>
    <rect x="107" y="68" width="6" height="21"/>
  </g>
  <rect x="8" y="89" width="105" height="2" fill="#4FC7FF" opacity="0.55"/>
  <text x="60" y="110" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif" font-size="21" font-weight="700" letter-spacing="2" fill="#F2F7FB">NVG</text>
</svg>
