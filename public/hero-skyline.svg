<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" fill="none" role="img" aria-label="Chicago skyline">
  <defs>
    <linearGradient id="heroSky" x1="0" y1="220" x2="960" y2="10" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4FC7FF"/>
      <stop offset="1" stop-color="#EAF7FF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4FC7FF" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <g fill="url(#heroSky)">
      <rect x="10" y="150" width="30" height="50"/>
      <rect x="46" y="165" width="22" height="35"/>

      <!-- setback tower -->
      <rect x="74" y="120" width="46" height="80"/>
      <rect x="85" y="100" width="24" height="20"/>
      <rect x="93" y="88" width="8" height="12"/>

      <rect x="128" y="140" width="24" height="60"/>

      <!-- Marina City twin towers -->
      <path d="M158,76 A16,16 0 0 1 190,76 Z"/>
      <rect x="158" y="76" width="32" height="124"/>
      <path d="M196,76 A16,16 0 0 1 228,76 Z"/>
      <rect x="196" y="76" width="32" height="124"/>

      <rect x="238" y="130" width="26" height="70"/>

      <!-- stepped pyramidal tower -->
      <rect x="270" y="110" width="44" height="90"/>
      <path d="M270,110 L314,110 L292,80 Z"/>
      <rect x="290" y="68" width="2.5" height="14"/>

      <rect x="322" y="145" width="24" height="55"/>

      <!-- Willis Tower, tallest, stepped top + twin antennas -->
      <rect x="354" y="70" width="64" height="130"/>
      <rect x="354" y="30" width="38" height="40"/>
      <rect x="368" y="6" width="2.2" height="24"/>
      <rect x="378" y="6" width="2.2" height="24"/>

      <rect x="426" y="150" width="22" height="50"/>

      <!-- Trump Tower Chicago, tapered tiers -->
      <rect x="544" y="130" width="46" height="70"/>
      <rect x="550" y="100" width="34" height="30"/>
      <rect x="556" y="78" width="22" height="22"/>

      <rect x="512" y="155" width="24" height="45"/>
      <rect x="598" y="145" width="28" height="55"/>
      <rect x="630" y="160" width="22" height="40"/>
      <rect x="656" y="138" width="32" height="62"/>

      <!-- water tower, crenellated -->
      <rect x="696" y="155" width="24" height="45"/>
      <rect x="698" y="148" width="4" height="7"/>
      <rect x="706" y="148" width="4" height="7"/>
      <rect x="714" y="148" width="4" height="7"/>

      <rect x="724" y="150" width="26" height="50"/>
      <rect x="754" y="168" width="20" height="32"/>
      <rect x="778" y="175" width="18" height="25"/>

      <rect x="798" y="196" width="140" height="4"/>
    </g>

    <!-- John Hancock Center, tapered with X-braces -->
    <path d="M452,200 L504,200 L494,86 L462,86 Z" fill="url(#heroSky)"/>
    <g stroke="#0b121b" stroke-width="1.4" opacity="0.55">
      <path d="M468,180 L488,150 M488,180 L468,150"/>
      <path d="M466,140 L490,112 M490,140 L466,112"/>
    </g>

    <!-- Ferris wheel -->
    <g stroke="#4FC7FF" stroke-width="2">
      <circle cx="880" cy="130" r="50" fill="none"/>
      <circle cx="880" cy="130" r="6" fill="none"/>
      <g opacity="0.9">
        <line x1="880" y1="80" x2="880" y2="180"/>
        <line x1="830" y1="130" x2="930" y2="130"/>
        <line x1="845" y1="95" x2="915" y2="165"/>
        <line x1="915" y1="95" x2="845" y2="165"/>
      </g>
      <path d="M856,198 L880,180 L904,198" stroke-width="2.4"/>
      <line x1="880" y1="180" x2="880" y2="198" stroke-width="2.4"/>
    </g>
    <g fill="#4FC7FF">
      <circle cx="880" cy="80" r="2.8"/>
      <circle cx="905" cy="88" r="2.8"/>
      <circle cx="923" cy="105" r="2.8"/>
      <circle cx="930" cy="130" r="2.8"/>
      <circle cx="923" cy="155" r="2.8"/>
      <circle cx="905" cy="172" r="2.8"/>
      <circle cx="880" cy="180" r="2.8"/>
      <circle cx="855" cy="172" r="2.8"/>
      <circle cx="837" cy="155" r="2.8"/>
      <circle cx="830" cy="130" r="2.8"/>
      <circle cx="837" cy="105" r="2.8"/>
      <circle cx="855" cy="88" r="2.8"/>
    </g>
  </g>
</svg>
